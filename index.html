<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛒 متجر ShopBot - تسوق بأفضل الأسعار</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #0a0e17;
    --bg-card: #111827;
    --bg-card-hover: #1a2332;
    --primary: #6366f1;
    --primary-glow: rgba(99, 102, 241, 0.4);
    --secondary: #22d3ee;
    --accent: #f472b6;
    --success: #10b981;
    --warning: #fbbf24;
    --gold: #fbbf24;
    --text-main: #f1f5f9;
    --text-muted: #94a3b8;
    --border: #1e293b;
    --gradient-1: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #d946ef 100%);
    --gradient-2: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { 
    font-family: 'Tajawal', sans-serif; 
    background: var(--bg-dark); 
    color: var(--text-main); 
    min-height: 100vh; 
    overflow-x: hidden; 
  }
  
  /* Header */
  header {
    background: var(--gradient-2);
    padding: 60px 16px 40px;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(244, 114, 182, 0.1) 0%, transparent 50%);
    animation: float 8s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    50% { transform: translate(-2%, 2%) rotate(1deg); }
  }
  .header-content { position: relative; z-index: 1; }
  .logo { 
    font-size: 2rem; 
    font-weight: 900; 
    text-align: center;
    background: var(--gradient-1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  .tagline { 
    text-align: center; 
    color: var(--text-muted); 
    font-size: 0.9rem;
  }
  
  /* Search */
  .search-container {
    margin: -30px 16px 20px;
    position: relative;
    z-index: 10;
  }
  .search-box {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 16px 20px 16px 50px;
    color: var(--text-main);
    font-family: 'Tajawal', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  }
  .search-box:focus {
    border-color: var(--primary);
    box-shadow: 0 4px 30px var(--primary-glow);
  }
  .search-box::placeholder { color: var(--text-muted); }
  .search-icon {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1.2rem;
    pointer-events: none;
  }
  
  /* Categories */
  .categories {
    padding: 0 16px 20px;
    overflow-x: auto;
    display: flex;
    gap: 10px;
    scrollbar-width: none;
  }
  .categories::-webkit-scrollbar { display: none; }
  .cat-btn {
    flex-shrink: 0;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 25px;
    padding: 12px 20px;
    color: var(--text-muted);
    font-family: 'Tajawal', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    white-space: nowrap;
  }
  .cat-btn.active {
    background: var(--gradient-1);
    border-color: transparent;
    color: white;
    box-shadow: 0 4px 20px var(--primary-glow);
  }
  .cat-btn:not(.active):hover {
    background: var(--bg-card-hover);
    border-color: var(--primary);
  }
  
  /* Products Grid */
  .products-section { padding: 0 16px 100px; }
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text-main);
  }
  .product-count {
    font-size: 0.85rem;
    color: var(--text-muted);
  }
  .products-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
  }
  
  /* Product Card */
  .product-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
  }
  .product-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--gradient-1);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .product-card:hover {
    transform: translateY(-8px);
    border-color: var(--primary);
    box-shadow: 0 20px 40px rgba(99, 102, 241, 0.2);
  }
  .product-card:hover::before { opacity: 1; }
  
  .badge {
    position: absolute;
    top: 12px;
    left: 12px;
    background: var(--gradient-1);
    color: white;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
    z-index: 2;
  }
  .badge.discount {
    background: var(--success);
  }
  
  .product-emoji {
    font-size: 2.8rem;
    display: block;
    text-align: center;
    margin-bottom: 12px;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
  }
  .product-name {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-main);
    line-height: 1.4;
    margin-bottom: 8px;
    min-height: 2.8em;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .product-price {
    font-size: 1.1rem;
    font-weight: 900;
    background: var(--gradient-1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }
  .product-original-price {
    font-size: 0.8rem;
    color: var(--text-muted);
    text-decoration: line-through;
    margin-left: 8px;
  }
  .product-rating {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    margin-bottom: 12px;
  }
  .stars {
    color: var(--gold);
    font-size: 0.85rem;
  }
  .rating-value {
    color: var(--text-muted);
    font-size: 0.75rem;
  }
  .buy-btn {
    display: block;
    width: 100%;
    background: var(--gradient-1);
    border: none;
    border-radius: 16px;
    padding: 12px;
    color: white;
    font-family: 'Tajawal', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.3s ease;
    text-align: center;
    text-decoration: none;
  }
  .buy-btn:hover {
    transform: scale(1.02);
    box-shadow: 0 8px 20px var(--primary-glow);
  }
  
  /* Bottom Navigation */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(17, 24, 39, 0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-around;
    padding: 12px 0 24px;
    z-index: 100;
  }
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 8px 16px;
    border-radius: 16px;
    transition: all 0.3s ease;
  }
  .nav-item.active {
    color: var(--primary);
    background: rgba(99, 102, 241, 0.1);
  }
  .nav-item span { font-size: 1.4rem; }
  .nav-item small { font-size: 0.7rem; font-weight: 500; }
  
  /* Empty State */
  .empty-state {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state span {
    font-size: 4rem;
    display: block;
    margin-bottom: 16px;
  }
  
  /* Loading Animation */
  .loading {
    display: flex;
    justify-content: center;
    padding: 40px;
  }
  .loading::after {
    content: '';
    width: 30px;
    height: 30px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

];

let currentCat = "all";
let searchQuery = "";

function makeLink(id) {
  return `https://www.amazon.fr/dp/${id}/tag=${AFFILIATE_TAG}`;
}

function stars(r) {
  return "⭐".repeat(Math.floor(r));
}

function renderProducts() {
  const grid = document.getElementById("productsGrid");
  const titleEl = document.getElementById("resultsTitle");
  const countEl = document.getElementById("productCount");
  
  let filtered = PRODUCTS.filter(p => {
    const catMatch = currentCat === "all" || p.cat === currentCat;
    const searchMatch = !searchQuery || p.name.includes(searchQuery);
    return catMatch && searchMatch;
  });
  
  titleEl.textContent = currentCat === "all" ? "جميع المنتجات" : getCategoryName(currentCat);
  countEl.textContent = `${filtered.length} منتج`;
  
  if (!filtered.length) {
    grid.innerHTML = `
      <div class="empty-state">
        <span>🔍</span>
        <p>لم يتم العثور على منتجات</p>
      </div>
    `;
    return;
  }
  
  grid.innerHTML = filtered.map(p => `
    <div class="product-card" onclick="window.open('${makeLink(p.id)}','_blank')">
      ${p.isNew ? '<div class="badge">جديد</div>' : ''}
      ${p.isDiscount && !p.isNew ? '<div class="badge discount">خصم</div>' : ''}
      <span class="product-emoji">${p.emoji}</span>
      <div class="product-name">${p.name}</div>
      <div class="product-price">
        ${p.price}
        ${p.oldPrice ? `<span class="product-original-price">${p.oldPrice}</span>` : ''}
      </div>
      <div class="product-rating">
        <span class="stars">${stars(p.rating)}</span>
        <span class="rating-value">${p.rating}</span>
      </div>
      <a class="buy-btn" href="${makeLink(p.id)}" target="_blank">
        🛒 شراء الآن
      </a>
    </div>
  `).join('');
}

function getCategoryName(cat) {
  const names = {
    "phones": "📱 الهواتف",
    "ساعات": "⌚ الساعات",
    "سماعات": "🎧 السماعات",
    "أجهزة": "💻 الأجهزة",
    "ألعاب": "🎮 الألعاب",
    "ملابس": "👕 الملابس",
    "كماليات": "💎 الكماليات"
  };
  return names[cat] || cat;
}

// Event Listeners
document.getElementById("categories").addEventListener("click", e => {
  const btn = e.target.closest(".cat-btn");
  if (!btn) return;
  
  document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  currentCat = btn.dataset.cat;
  renderProducts();
});

document.getElementById("searchInput").addEventListener("input", e => {
  searchQuery = e.target.value.trim();
  renderProducts();
});
